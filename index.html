<head>

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
            }

            to {
                transform: translateX(0);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        .slide-in {
            animation: slideIn 0.3s ease-out;
        }

        .pulse-hover:hover {
            animation: pulse 0.6s ease-in-out;
        }

        .float-animation {
            animation: float 3s ease-in-out infinite;
        }

        .gradient-text {
            background: linear-gradient(135deg, #f59e0b 0%, #ef4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Animaciones nuevas */
        @keyframes scaleIn {
            from {
                transform: scale(0);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            75% {
                transform: translateX(10px);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .scale-in {
            animation: scaleIn 0.3s ease-out;
        }

        .slide-up {
            animation: slideUp 0.4s ease-out;
        }

        .shake {
            animation: shake 0.5s ease-in-out;
        }

        .spinner {
            animation: spin 1s linear infinite;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Mobile optimizations */
        @media (max-width: 768px) {
            .mobile-hide {
                display: none;
            }

            .mobile-full {
                width: 100% !important;
            }

            .mobile-stack {
                flex-direction: column;
            }

            /* Botones solo iconos en móvil */
            .btn-text-mobile {
                font-size: 0;
            }

            /* Reducir tamaños */
            .p-8 {
                padding: 1rem !important;
            }

            .p-6 {
                padding: 0.75rem !important;
            }

            .text-2xl {
                font-size: 1.25rem !important;
            }

            .text-3xl {
                font-size: 1.5rem !important;
            }

            /* Calendario más compacto */
            .calendar-day {
                min-height: 60px !important;
                padding: 0.25rem !important;
                font-size: 0.75rem !important;
            }
        }

        /* Ocultar scrollbar pero mantener funcionalidad */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Mejorar táctil en móvil */
        @media (max-width: 768px) {

            button,
            input,
            select {
                touch-action: manipulation;
            }
        }
        /* Reducir animaciones en móvil para mejor rendimiento */
        @media (max-width: 768px) {
            .pulse-hover:hover { animation: none; }
            .float-animation { animation: none; }
            .fade-in { animation: none; }
            .scale-in { animation: none; }
        }
        /* Tablas responsivas */
        @media (max-width: 768px) {
            table {
                font-size: 0.875rem;
            }

            table th,
            table td {
                padding: 0.5rem !important;
            }

            .overflow-x-auto {
                -webkit-overflow-scrolling: touch;
            }
        }

        /* Mejoras modo nocturno */
        .dark-mode-improved {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        /* Forzar inputs claros siempre */
        input, textarea, select {
            color-scheme: light;
            background-color: white;
            color: #111827;
        }
    </style>

</head>

    <script type="text/babel">

        function Toast({ toasts, remove }) {

        function LandingPage({ onEnterAdmin, onEnterCliente }) {

        function LoginCliente({ onLogin, onVolver }) {
            const [telefono, setTelefono] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [modo, setModo] = useState('login'); // 'login' o 'registro'
            const [nombre, setNombre] = useState('');

            const handleLogin = async () => {
                if (!telefono || telefono.length < 7) { setError('Ingresa un número válido'); return; }
                setLoading(true); setError('');
                try {
                    const tel = telefono.replace(/\D/g, '');
                    // Normalizar: quitar 57 si viene con código de país
                    const telSin57 = tel.startsWith('57') && tel.length === 12 ? tel.slice(2) : tel;
                    const telCon57 = '57' + telSin57;

                    // Buscar en clientes_portal con ambos formatos
                    const { data: portalData } = await supabaseClient
                        .from('clientes_portal')
                        .select('*, clientes(*)')
                        .or(`telefono.eq.${telSin57},telefono.eq.${telCon57}`)
                        .maybeSingle();

                    if (portalData) {
                        if (portalData.estado === 'pendiente') {
                            setError('Tu cuenta está pendiente de aprobación. Te avisaremos pronto.');
                            setLoading(false); return;
                        }
                        if (portalData.estado === 'rechazado') {
                            setError('Tu cuenta no fue aprobada. Contacta al negocio.');
                            setLoading(false); return;
                        }
                        await supabaseClient.from('clientes_portal').update({ ultimo_acceso: new Date().toISOString() }).eq('id', portalData.id);
                        onLogin(portalData);
                        return;
                    }

                    // Si no está en portal, buscar en tabla clientes con ambos formatos
                    const { data: clienteExistente } = await supabaseClient
                        .from('clientes')
                        .select('*')
                        .or(`telefono.eq.${telSin57},telefono.eq.${telCon57}`)
                        .eq('activo', true)
                        .maybeSingle();

                    if (clienteExistente) {
                        const { data: nuevoPortal, error: errPortal } = await supabaseClient
                            .from('clientes_portal')
                            .insert({
                                telefono: clienteExistente.telefono,
                                nombre: clienteExistente.nombre,
                                estado: 'aprobado',
                                cliente_id: clienteExistente.id,
                                ultimo_acceso: new Date().toISOString()
                            }).select().single();

                        if (!errPortal && nuevoPortal) {
                            onLogin({ ...nuevoPortal, clientes: clienteExistente });
                            return;
                        }
                    }

                    setError('Número no encontrado. ¿Eres nuevo? Regístrate abajo.');
                } catch(err) {
                    setError('Error al ingresar. Intenta de nuevo.');
                } finally { setLoading(false); }
            };

            const handleRegistro = async () => {
                if (!nombre.trim()) { setError('Ingresa tu nombre'); return; }
                if (!telefono || telefono.length < 7) { setError('Ingresa un número válido'); return; }
                setLoading(true); setError('');
                try {
                    const tel = telefono.replace(/\D/g, '');
                    // Verificar si ya existe
                    const { data: existe } = await supabaseClient.from('clientes_portal').select('id').eq('telefono', tel).single();
                    if (existe) { setError('Este número ya está registrado. Intenta ingresar.'); setLoading(false); return; }

                    // Buscar si hay un cliente con ese teléfono en clientes
                    const { data: clienteExistente } = await supabaseClient.from('clientes').select('id').eq('telefono', tel).single();

                    // Crear registro en clientes_portal
                    const { error } = await supabaseClient.from('clientes_portal').insert({
                        telefono: tel,
                        nombre: nombre.trim(),
                        estado: 'pendiente',
                        cliente_id: clienteExistente?.id || null
                    });

                    if (error) { setError('Error al registrarse: ' + error.message); setLoading(false); return; }

                    // Notificar al admin por WhatsApp
                    const msgAdmin = `🔔 Nuevo cliente registrado en el portal:\n\nNombre: ${nombre}\nTeléfono: ${tel}\n\nEntra a la app para aprobarlo.`;
                    const waUrl = `https://wa.me/57${tel}?text=${encodeURIComponent(msgAdmin)}`;

                    setError('');
                    setModo('pendiente');
                } catch(err) {
                    setError('Error al registrarse.');
                } finally { setLoading(false); }
            };

            if (modo === 'pendiente') {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-green-50 to-emerald-100 flex items-center justify-center p-4">
                        <div className="fade-in bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm text-center border-t-8 border-green-500">
                            <span className="text-6xl mb-4 block">⏳</span>
                            <h2 className="text-2xl font-bold text-gray-800 mb-3">¡Registro exitoso!</h2>
                            <p className="text-gray-600 mb-6">Tu cuenta está pendiente de aprobación. Te avisaremos pronto por WhatsApp.</p>
                            <button onClick={() => { setModo('login'); setNombre(''); setTelefono(''); }}

                                Volver al inicio
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gradient-to-br from-green-50 to-emerald-100 flex items-center justify-center p-4">
                    <div className="fade-in bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border-t-8 border-green-500">
                        <div className="text-center mb-6">
                            <img src="Arepas.png" alt="Logo" className="w-20 h-20 mx-auto mb-3 drop-shadow-lg" />
                            <h1 className="text-2xl font-bold gradient-text">Arepas al Carbon</h1>
                            <p className="text-gray-500 text-sm mt-1">Portal de Clientes</p>
                        </div>

                        <div className="flex gap-2 mb-6">
                            <button onClick={() => { setModo('login'); setError(''); }}
                                className={`flex-1 py-2 rounded-xl font-bold text-sm transition ${modo === 'login' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                                Ingresar
                            </button>
                            <button onClick={() => { setModo('registro'); setError(''); }}
                                className={`flex-1 py-2 rounded-xl font-bold text-sm transition ${modo === 'registro' ? 'bg-green-600 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
                                Registrarse
                            </button>
                        </div>

                        <button onClick={onVolver}
                            className="w-full mb-4 py-2 text-sm text-gray-500 hover:text-gray-700 transition flex items-center justify-center gap-1">
                            ← Volver a selección de acceso
                        </button>

                        <div className="space-y-4">
                            {modo === 'registro' && (
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-1">👤 Tu nombre completo</label>
                                    <input type="text" value={nombre} onChange={e => setNombre(e.target.value)}
                                        placeholder="Ej: Juan Pérez"
                                        className="w-full p-3 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent bg-white text-gray-900" />
                                </div>
                            )}
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">📱 Tu número de WhatsApp</label>
                                <input type="tel" value={telefono} onChange={e => setTelefono(e.target.value)}
                                    placeholder="Ej: 3001234567"
                                    className="w-full p-3 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-transparent bg-white text-gray-900" />
                            </div>

                            {error && (
                                <div className="bg-red-50 border-2 border-red-200 text-red-700 px-3 py-2 rounded-xl text-sm flex items-center gap-2">
                                    <span>⚠️</span> {error}
                                </div>
                            )}

                            <button onClick={modo === 'login' ? handleLogin : handleRegistro}
                                disabled={loading}
                                className="w-full bg-gradient-to-r from-green-500 to-green-600 text-white p-4 rounded-xl font-bold text-lg hover:from-green-600 hover:to-green-700 transition disabled:opacity-50 shadow-lg">
                                {loading ? '🔄 Cargando...' : modo === 'login' ? '🚀 Ingresar' : '✅ Registrarse'}
                            </button>

        function LoginPage({ onLogin }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                if (error) {
                    setError('Credenciales incorrectas');
                    setLoading(false);
                } else {
                    onLogin(data.user);
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-amber-100 via-orange-50 to-yellow-100 flex items-center justify-center p-4">
                    <div className="fade-in bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md border-t-8 border-orange-600">

                                <span className="text-6xl">🔥</span>
                            </div>
                            <h1 className="text-4xl font-bold gradient-text mb-3">Arepas al Carbon</h1>
                            <p className="text-gray-600 text-lg">Sistema de Gestión</p>
                        </div>

                        <form onSubmit={handleLogin} className="space-y-5">
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">📧 Correo electrónico</label>
                                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full p-4 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent transition bg-white text-gray-900" placeholder="tu@email.com" required />
                            </div>

                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">🔒 Contraseña</label>
                                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full p-4 border-2 border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-transparent transition bg-white text-gray-900" placeholder="••••••••" required />
                            </div>

                            {error && (
                                <div className="fade-in bg-red-50 border-2 border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm flex items-center gap-2">
                                    <span>⚠️</span> {error}
                                </div>
                            )}

                            <button type="submit" disabled={loading} className="w-full bg-gradient-to-r from-amber-600 to-orange-600 text-white p-4 rounded-xl font-bold text-lg hover:from-amber-700 hover:to-orange-700 transition disabled:opacity-50 shadow-lg pulse-hover">

            );

        function HistorialCompras({ clientes, ventas, pushToast, loadData, supabaseClient, formatCOP, darkMode, enviarWhatsApp, historialAbiertos, toggleHistorial, historialBusqueda, setHistorialBusqueda, historialOrden, setHistorialOrden }) {
            const [selectedCliente, setSelectedCliente] = useState(null);
            const [abonoTotal, setAbonoTotal] = useState('');

            const calcularDeudaPorCliente = () => {
                const deudas = {};

                clientes.filter(c => c.activo !== false).forEach(cliente => {
                    const ventasCliente = ventas.filter(v => v.cliente_id === cliente.id && v.estado_pago === 'Pendiente');

                    if (ventasCliente.length > 0) {
                        const fechas = {};
                        ventasCliente.forEach(v => {
                            let fecha = 'Sin fecha';
                            if (v.fecha) {
                                const fechaObj = new Date(v.fecha);
                                const year = fechaObj.getUTCFullYear();
                                const month = String(fechaObj.getUTCMonth() + 1).padStart(2, '0');
                                const day = String(fechaObj.getUTCDate()).padStart(2, '0');
                                fecha = `${day}/${month}/${year}`;
                            }

                            const deuda = (parseFloat(v.total) || 0) - (parseFloat(v.abono) || 0);

                            if (!fechas[fecha]) {
                                fechas[fecha] = { fecha, deuda: 0, ventas: [] };
                            }
                            fechas[fecha].deuda += deuda;
                            fechas[fecha].ventas.push(v);
                        });

                        const fechasArray = Object.values(fechas).sort((a, b) => {
                            if (a.fecha === 'Sin fecha') return 1;
                            if (b.fecha === 'Sin fecha') return -1;
                            return new Date(a.ventas[0].fecha) - new Date(b.ventas[0].fecha);
                        });
                        const totalDeuda = fechasArray.reduce((sum, f) => sum + f.deuda, 0);

                        if (totalDeuda > 0) {
                            deudas[cliente.id] = {
                                cliente,
                                fechas: fechasArray,
                                totalDeuda,
                                cantidadFechas: fechasArray.length
                            };
                        }
                    }
                });

                return deudas;
            };

            const handleAbonoTotal = async () => {
                if (!selectedCliente || !abonoTotal) {
                    pushToast('Ingresa un monto válido', 'error');
                    return;
                }

                const monto = parseFloat(abonoTotal);
                if (isNaN(monto) || monto <= 0) {
                    pushToast('Ingresa un monto válido', 'error');
                    return;
                }

                const deudaInfo = deudas[selectedCliente];

                            const abonoVenta = Math.min(montoRestante, deudaVenta);
                            const nuevoAbono = (parseFloat(venta.abono) || 0) + abonoVenta;
                            const nuevoEstado = nuevoAbono >= parseFloat(venta.total) ? 'Pagado' : 'Pendiente';

                            const { error: errorVenta } = await supabaseClient.from('ventas').update({
                                abono: nuevoAbono,
                                estado_pago: nuevoEstado
                            }).eq('id', venta.id);

                                concepto: `Abono - ${deudaInfo.cliente.nombre} [ID:${venta.id}]`,

                                categoria: 'Abono',
                                fecha: new Date().toISOString(),
                                notas: `venta_id:${venta.id}`
                            }).select();

                            if (!errorIngreso) ventasActualizadas.push({ id: venta.id, monto: abonoVenta });

                        }

                if (ingreso && (ingreso.categoria === 'Abono' || ingreso.categoria === 'Venta')) {

                    // Método 1: Buscar en las notas

                        ventaId = parseInt(ingreso.notas.split('venta_id:')[1]);

                    // Método 2: Buscar en el concepto (formato [ID:123])
                    if (!ventaId && ingreso.concepto && ingreso.concepto.includes('[ID:')) {
                        const match = ingreso.concepto.match(/\[ID:(\d+)\]/);
                        if (match) ventaId = parseInt(match[1]);
                    }

                    // Método 3: Buscar formato antiguo "Venta ID:"
                    if (!ventaId && ingreso.concepto && ingreso.concepto.includes('Venta ID:')) {
                        const match = ingreso.concepto.match(/Venta ID:\s*(\d+)/);
                        if (match) ventaId = parseInt(match[1]);
                    }


                    if (ventaId) {
                        // Obtener la venta
                        const { data: venta } = await supabaseClient
                            .from('ventas')
                            .select('*')
                            .eq('id', ventaId)
                            .single();

                        if (venta) {
                            const montoADescontar = parseFloat(ingreso.monto) || 0;
                            const abonoActual = parseFloat(venta.abono) || 0;
                            const totalVenta = parseFloat(venta.total) || 0;
                            const nuevoAbono = Math.max(0, abonoActual - montoADescontar);
                            const nuevoEstado = nuevoAbono >= totalVenta ? 'Pagado' : 'Pendiente';

                            const { error: errorUpdate } = await supabaseClient
                                .from('ventas')
                                .update({
                                    abono: nuevoAbono,
                                    estado_pago: nuevoEstado
                                })
                                .eq('id', ventaId);

                            if (!errorUpdate) {
                            } else {
                                console.error('Error al actualizar venta:', errorUpdate);
                            }
                        }
                    } else {
                    }
                }

                // Eliminar el ingreso
                const { error } = await supabaseClient.from('ingresos').delete().eq('id', id);

                if (error) {
                    console.error('ERROR DELETE INGRESO:', error);
                    pushToast('Error al eliminar', 'error');

                    await loadData();

            const deleteEgreso = async (id) => {

            const addPedido = async (e) => {

                            return fecha >= desde && fecha <= hasta;

                            console.error('Error procesando fecha:', f, err);

                    const egrFil = egresos.filter(e => e.fecha && filtrarFecha(e.fecha));

                    const totalAbonos = ventasFil.reduce((s, v) => (s + (parseFloat(v.abono) || 0)), 0);

                    {/* Modal aprobación cliente portal */}
                    {modalAprobar && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4" onClick={() => setModalAprobar(null)}>
                            <div className={`${darkMode ? 'bg-gray-800 text-white' : 'bg-white'} p-6 rounded-2xl shadow-2xl w-full max-w-md`} onClick={e => e.stopPropagation()}>
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-lg font-bold flex items-center gap-2">✅ Aprobar Cliente</h3>
                                    <button onClick={() => setModalAprobar(null)} className="text-2xl hover:text-red-500">×</button>
                                </div>

                                {/* Info del solicitante */}
                                <div className={`p-3 rounded-xl mb-4 ${darkMode ? 'bg-gray-700' : 'bg-gray-50'}`}>
                                    <p className="font-bold">{modalAprobar.nombre}</p>
                                    <p className={`text-sm ${darkMode ? 'text-gray-400' : 'text-gray-500'}`}>📱 {modalAprobar.telefono}</p>
                                </div>

                                {/* Opciones */}
                                <p className={`text-sm font-semibold mb-3 ${darkMode ? 'text-gray-300' : 'text-gray-700'}`}>¿Este usuario ya existe como cliente?</p>

                                {/* Buscar cliente existente */}
                                <div className="mb-4">
                                    <input type="text"
                                        value={buscarClienteVinc}
                                        onChange={e => { setBuscarClienteVinc(e.target.value); setClienteVinculado(null); }}
                                        placeholder="🔍 Buscar cliente existente..."
                                        className={`w-full p-3 border-2 rounded-xl text-sm ${darkMode ? 'bg-gray-700 text-white border-gray-600' : 'bg-white text-gray-900 border-gray-200'}`} />

                                    {/* Lista de coincidencias */}
                                    {buscarClienteVinc.length > 0 && (
                                        <div className={`mt-2 border-2 rounded-xl overflow-hidden max-h-40 overflow-y-auto ${darkMode ? 'border-gray-600' : 'border-gray-200'}`}>
                                            {clientes.filter(c => c.activo !== false &&
                                                c.nombre.toLowerCase().includes(buscarClienteVinc.toLowerCase())
                                            ).slice(0, 6).map(c => (
                                                <button key={c.id}
                                                    onClick={() => { setClienteVinculado(c); setBuscarClienteVinc(c.nombre); }}
                                                    className={`w-full text-left px-3 py-2 text-sm transition ${clienteVinculado?.id === c.id ? 'bg-green-500 text-white' : darkMode ? 'hover:bg-gray-700 text-white' : 'hover:bg-gray-50 text-gray-800'}`}>
                                                    <span className="font-medium">{c.nombre}</span>
                                                    <span className={`text-xs ml-2 ${clienteVinculado?.id === c.id ? 'text-green-100' : 'text-gray-400'}`}>{c.tipo_cliente}</span>
                                                </button>
                                            ))}
                                            {clientes.filter(c => c.activo !== false && c.nombre.toLowerCase().includes(buscarClienteVinc.toLowerCase())).length === 0 && (
                                                <p className="px-3 py-2 text-sm text-gray-400">Sin resultados</p>
                                            )}
                                        </div>
                                    )}
                                </div>

                                {clienteVinculado && (
                                    <div className={`p-3 rounded-xl mb-4 border-2 border-green-400 ${darkMode ? 'bg-green-900/20' : 'bg-green-50'}`}>
                                        <p className="text-sm font-bold text-green-600">✅ Vincular con: {clienteVinculado.nombre}</p>
                                        <p className="text-xs text-gray-500">Se usará este cliente existente</p>
                                    </div>
                                )}

                                <div className="flex flex-col gap-2">
                                    {/* Aprobar vinculando o creando */}
                                    <button onClick={async () => {
                                        let clienteId = clienteVinculado?.id || null;

                                        // Si no vinculó, crear cliente nuevo
                                        if (!clienteId) {
                                            const { data: nuevo } = await supabaseClient.from('clientes').insert({
                                                nombre: modalAprobar.nombre,
                                                telefono: modalAprobar.telefono,
                                                tipo_cliente: 'Individual',
                                                activo: true
                                            }).select();
                                            clienteId = nuevo?.[0]?.id || null;
                                        } else {
                                            // Actualizar teléfono del cliente existente si no lo tiene
                                            if (!clienteVinculado.telefono) {
                                                await supabaseClient.from('clientes').update({ telefono: modalAprobar.telefono }).eq('id', clienteId);
                                            }
                                        }

                                        // Aprobar en portal
                                        await supabaseClient.from('clientes_portal').update({
                                            estado: 'aprobado',
                                            cliente_id: clienteId
                                        }).eq('id', modalAprobar.id);

                                        enviarNotifLocal('✅ Cliente aprobado', modalAprobar.nombre + ' ya puede acceder al portal');
                                        pushToast('✅ Cliente aprobado');

                                        // Notificar por WhatsApp
                                        const msg = `¡Hola ${modalAprobar.nombre}! 🎉 Tu cuenta en el portal de Arepas al Carbón fue aprobada. Ya puedes ingresar con tu número. ¡Bienvenido! 🫓`;
                                        window.open(`https://wa.me/${modalAprobar.telefono}?text=${encodeURIComponent(msg)}`, '_blank');

                                        setModalAprobar(null);
                                        setBuscarClienteVinc('');
                                        setClienteVinculado(null);
                                        loadData();
                                    }}
                                    className="w-full bg-gradient-to-r from-green-500 to-green-600 text-white p-3 rounded-xl font-bold text-sm hover:from-green-600 hover:to-green-700 transition">
                                        {clienteVinculado ? `✅ Aprobar y vincular con ${clienteVinculado.nombre}` : '✅ Aprobar y crear como nuevo cliente'}
                                    </button>

                                    <button onClick={() => { setModalAprobar(null); setBuscarClienteVinc(''); setClienteVinculado(null); }}
                                        className={`w-full p-3 rounded-xl font-bold text-sm transition ${darkMode ? 'bg-gray-700 text-white hover:bg-gray-600' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}>
                                        Cancelar
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <Toast toasts={toasts} remove={removeToast} />
                </div>
           
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>

</html>
